<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f4f4f4;
    }

    header {
        background: url('fairy-header.png') no-repeat center center/cover;
        color: white;
        padding: 60px 20px;
        text-align: center;
        position: relative;
    }

    /* Optional dark overlay for readability */
    header::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
    }

    header h1,
    header nav {
        position: relative;
        z-index: 1;
    }

    nav a {
        color: white;
        margin: 0 10px;
        text-decoration: none;
        font-weight: bold;
    }

    nav a:hover {
        text-decoration: underline;
    }

    .container {
        max-width: 800px;
        margin: 40px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
    }
	form {
            display: flex;
            flex-direction: column;
        }
        input, textarea {
            margin-bottom: 15px;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    footer {
        text-align: center;
        padding: 15px;
        background: #222;
        color: white;
        margin-top: 40px;
    }
</style>
</head>
<body>

<header>
    <h1>Contact Fairy World</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="About.html">About</a>
        <a href="Contact.html">Contact</a>
    </nav>
</header>

<div class="container">
    <h2>Get in Touch</h2>
    <p>Have questions? We'd love to hear from you!</p>

    <form onsubmit="submitForm(event)">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="5" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
</div>

<footer>
    <p>© 2026 My Store</p>
</footer>

<script>
    function submitForm(event) {
        event.preventDefault();
        alert("Thank you! Your message has been sent.");
    }
</script>

</body>
</html>
